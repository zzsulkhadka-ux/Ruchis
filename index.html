<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruchi - Where Bold Flavours Meet Quiet Luxury</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:ital,wght@0,300;0,400&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="grain"></div>

<section class="hero">
    <h1>Where Bold Flavours<br>Meet Quiet Luxury.</h1>
    <p class="subtitle">An evening at Ruchi doesn't end at the table.</p>
    <a href="#reservation" class="cta-button">Reserve Your Evening</a>
</section>

<section class="brand-story">
    <h2>A Kitchen with Conviction.</h2>
    <div class="section-divider"></div>
    <p>We don't chase trends. We chase perfection.</p>
</section>

<section class="signature-dishes">
    <h2>The Menu Speaks.</h2>
    <div class="dishes-grid">
        <div class="dish-card">
            <div class="dish-name">Saffron Lamb Raan</div>
            <div class="dish-desc">Slow-roasted overnight.</div>
        </div>
    </div>
</section>

<section class="reservation" id="reservation">
    <h2>The Table Is Yours.</h2>

    <form class="reservation-form">
        <input type="text" placeholder="Name" required>
        <input type="date" required>
        <input type="email" placeholder="Email" required>

        <button type="submit" class="cta-button">Request Reservation</button>
    </form>
</section>

<footer class="footer">
    <h3>Ruchi</h3>
</footer>

<!-- JS -->
<script src="js/script.js"></script>

</body>
</html>
